---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-db
  labels:
    app: oracle-db
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oracle-db
  template:
    metadata:
      labels:
        app: oracle-db
    spec:
      containers:
        - name: oracle-db
          image: container-registry.oracle.com/database/free:23.7.0.0-lite
          ports:
            - containerPort: 1521
          env:
            - name: ORACLE_PWD
              value: "password"
          readinessProbe:
            exec:
              command:
                - "/opt/oracle/checkDBStatus.sh"
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: oracle-db
  namespace: default
spec:
  selector:
    app: oracle-db
  ports:
    - protocol: TCP
      port: 1521
      targetPort: 1521
